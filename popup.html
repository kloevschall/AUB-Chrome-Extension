<!doctype html>
<!--
 This page is shown when the extension button is clicked, because the
 "action" field in manifest.json contains the "default_popup" key with
 value "popup.html".
 -->
<html>
  <head>
    <title>Aalborg University Library Online Access Checker</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 14px;
        margin: 0;
        padding: 16px;
        min-width: 220px;
        background-color: #f9f9f9;
        color: #333;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      #status {
        font-weight: 500;
        margin-top: 8px;
        line-height: 1.4;
        white-space: pre-wrap;
      }
      .header {
        font-size: 12px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .error {
        color: #d32f2f;
      }
    </style>
    <script src="popup.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="header">Aalborg University Library</div>
      <div id="status">Initializing...</div>
    </div>
  </body>
</html>
